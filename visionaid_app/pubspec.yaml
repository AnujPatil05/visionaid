name: visionaid_app
description: "VisionAid — assistive sign-reading app for visually impaired users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  http: ^1.1.0
  http_parser: ^4.0.2
  flutter_tts: ^3.8.3
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.json
